[build]
  # The database schema is managed out-of-band (Supabase), not via Prisma
  # Migrate — the prisma/migrations history is not in sync with the live DB, so
  # `migrate deploy` fails (e.g. "relation users already exists"). The build only
  # needs the generated client; schema changes are applied to the DB directly.
  command = "npx prisma generate && npm run build"
  publish = ".next"

[build.environment]
  NODE_OPTIONS = "--max-old-space-size=4096"

[functions]
  included_files = ["data/presets/**"]

[[plugins]]
  package = "@netlify/plugin-nextjs"

[context.production.environment]
  NEXT_PUBLIC_SITE_URL = "https://vierradev.com"

# Static files (robots.txt, IndexNow key, etc.) are served by Netlify's edge and
# bypass the Next.js headers() config, so set HSTS here to match the app routes.
[[headers]]
  for = "/*.txt"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains"
